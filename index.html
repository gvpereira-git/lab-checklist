<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Lab Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --border: #d6cfc2;
    --text: #1a1612;
    --muted: #8a8278;
    --accent-prep: #c8571a;
    --accent-protocol: #1a6e3e;
    --accent-safety: #1a4a8e;
    --accent-data: #7a1a8e;
    --done-bg: #e8e4dd;
    --done-text: #a09890;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px;
  }

  .widget { max-width: 680px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    border-bottom: 2px solid var(--text);
    padding-bottom: 10px;
    gap: 12px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .date-nav { display: flex; align-items: center; gap: 6px; }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--text); color: var(--text); }

  #datePicker {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    cursor: pointer;
    letter-spacing: 0.04em;
    padding: 2px 4px;
  }

  .today-badge {
    font-family: var(--mono);
    font-size: 9px;
    background: var(--text);
    color: var(--bg);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }

  .past-notice {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--done-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    margin-bottom: 14px;
    letter-spacing: 0.04em;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    margin-bottom: 20px;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: -16px;
    margin-bottom: 18px;
    letter-spacing: 0.04em;
  }

  .category { margin-bottom: 20px; }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .cat-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .cat-add-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 7px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .cat-add-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface); }

  .task-list { display: flex; flex-direction: column; gap: 4px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px 8px 12px;
    transition: all 0.2s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item.done { background: var(--done-bg); border-color: transparent; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--done-text); }

  .task-item.carried {
    border-style: dashed;
  }

  .carried-tag {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .task-check {
    appearance: none;
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    position: relative;
  }
  .task-check:checked { background: var(--text); border-color: var(--text); }
  .task-check:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(40deg);
  }

  .task-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1.3;
  }

  .task-del {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
    font-family: var(--mono);
  }
  .task-del:hover { color: #c0392b; }

  .task-comment-btn {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .task-comment-btn:hover { color: #888; }
  .task-comment-btn.has-comment { color: var(--accent-protocol); }

  .task-comment-box {
    display: none;
    margin-top: 4px;
    margin-left: 26px;
    animation: slideIn 0.15s ease;
  }
  .task-comment-box.visible { display: block; }

  .task-comment-textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    min-height: 54px;
    outline: none;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  .task-comment-textarea:focus { border-color: var(--accent-data); }
  .task-comment-textarea::placeholder { color: var(--border); font-style: italic; }

  .task-comment-saved {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.04em;
    padding: 0 2px;
  }

  .add-task-row { display: none; gap: 6px; margin-top: 4px; animation: slideIn 0.15s ease; }
  .add-task-row.visible { display: flex; }

  .add-task-input {
    flex: 1;
    border: 1px solid var(--text);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: var(--sans);
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .add-task-input::placeholder { color: var(--muted); }

  .add-confirm-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 7px 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-confirm-btn:hover { opacity: 0.8; }

  .add-cancel-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-cancel-btn:hover { border-color: var(--text); color: var(--text); }

  footer {
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #c0392b; color: #c0392b; }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--text); color: var(--text); }

  .copy-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .copy-btn:hover { opacity: 0.75; }

  .summary-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  [data-cat="prep"] .cat-dot { background: var(--accent-prep); }
  [data-cat="prep"] .task-check:checked { background: var(--accent-prep); border-color: var(--accent-prep); }
  [data-cat="prep"] .task-item:not(.done) { border-left: 3px solid var(--accent-prep); }

  [data-cat="protocol"] .cat-dot { background: var(--accent-protocol); }
  [data-cat="protocol"] .task-check:checked { background: var(--accent-protocol); border-color: var(--accent-protocol); }
  [data-cat="protocol"] .task-item:not(.done) { border-left: 3px solid var(--accent-protocol); }

  [data-cat="safety"] .cat-dot { background: var(--accent-safety); }
  [data-cat="safety"] .task-check:checked { background: var(--accent-safety); border-color: var(--accent-safety); }
  [data-cat="safety"] .task-item:not(.done) { border-left: 3px solid var(--accent-safety); }

  [data-cat="data"] .cat-dot { background: var(--accent-data); }
  [data-cat="data"] .task-check:checked { background: var(--accent-data); border-color: var(--accent-data); }
  [data-cat="data"] .task-item:not(.done) { border-left: 3px solid var(--accent-data); }

  .empty-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border);
    letter-spacing: 0.06em;
    padding: 6px 0;
  }

  @keyframes fadeToast {
    0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  #copyToast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 20px;
    border-radius: 4px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="widget">
  <header>
    <h1>Daily Lab Checklist</h1>
    <div class="date-nav">
      <button class="nav-btn" onclick="shiftDate(-1)" title="Previous day">&#8249;</button>
      <input type="date" id="datePicker" onchange="onDateChange()">
      <button class="nav-btn" onclick="shiftDate(1)" title="Next day">&#8250;</button>
      <span class="today-badge" id="todayBadge">TODAY</span>
    </div>
  </header>

  <div id="pastNotice" class="past-notice" style="display:none">
    Viewing a past day — changes are saved but marked as historical.
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 0 tasks complete</div>

  <div id="categories"></div>

  <footer>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="reset-btn" onclick="resetAll()">&#8635; Reset Day</button>
      <button class="reset-btn" onclick="clearAll()" style="font-size:9px">&#10005; Clear All</button>
      <button class="action-btn" onclick="carryOverToNextDay()" title="Copy unfinished tasks to the next day">&#8594; Carry Over Unfinished</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="summary-text" id="footerSummary"></span>
      <button class="copy-btn" onclick="copyAsText()">&#128203; Copy for Notebook</button>
    </div>
  </footer>
</div>

<div id="copyToast"></div>

<script>
const CATEGORIES = [
  { id: 'prep',     label: 'Lab Prep' },
  { id: 'protocol', label: 'Experimental Steps' },
  { id: 'safety',   label: 'Safety Checks' },
  { id: 'data',     label: 'Data & Analysis' },
];

const todayDate = new Date().toISOString().slice(0, 10);
let currentDate = new URLSearchParams(window.location.search).get('page') || todayDate;
let state = {};

function storageKey(date) { return 'labChecklist_' + date; }

function loadState(date) {
  state = {};
  try {
    const saved = localStorage.getItem(storageKey(date));
    if (saved) {
      const parsed = JSON.parse(saved);
      CATEGORIES.forEach(cat => { state[cat.id] = parsed[cat.id] || []; });
      return;
    }
  } catch(e) {}
  CATEGORIES.forEach(cat => { state[cat.id] = []; });
}

function saveState() {
  try { localStorage.setItem(storageKey(currentDate), JSON.stringify(state)); } catch(e) {}
}

function isToday() { return currentDate === todayDate; }

function onDateChange() {
  currentDate = document.getElementById('datePicker').value;
  loadState(currentDate);
  render();
}

function shiftDate(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0, 10);
  document.getElementById('datePicker').value = currentDate;
  loadState(currentDate);
  render();
}

function getNextDate(date) {
  const d = new Date(date + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  // Skip Saturday (6) and Sunday (0) — jump to Monday
  if (d.getDay() === 6) d.setDate(d.getDate() + 2); // Sat -> Mon
  if (d.getDay() === 0) d.setDate(d.getDate() + 1); // Sun -> Mon
  return d.toISOString().slice(0, 10);
}

function carryOverToNextDay() {
  // Collect all unchecked tasks from current day
  let anyUnchecked = false;
  CATEGORIES.forEach(cat => {
    if (state[cat.id].some(t => !t.done)) anyUnchecked = true;
  });

  if (!anyUnchecked) {
    showToast('No unfinished tasks to carry over!', 2200);
    return;
  }

  const nextDate = getNextDate(currentDate);
  const nextDateLabel = new Date(nextDate + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  if (!confirm('Copy all unfinished tasks to ' + nextDateLabel + '?')) return;

  // Load next day's state
  let nextState = {};
  try {
    const saved = localStorage.getItem(storageKey(nextDate));
    if (saved) {
      const parsed = JSON.parse(saved);
      CATEGORIES.forEach(cat => { nextState[cat.id] = parsed[cat.id] || []; });
    } else {
      CATEGORIES.forEach(cat => { nextState[cat.id] = []; });
    }
  } catch(e) {
    CATEGORIES.forEach(cat => { nextState[cat.id] = []; });
  }

  // Prepend unchecked tasks to next day (mark as carried over, reset to unchecked)
  let count = 0;
  CATEGORIES.forEach(cat => {
    const unchecked = state[cat.id].filter(t => !t.done);
    const carried = unchecked.map(t => ({
      id: cat.id + '_co_' + Date.now() + '_' + Math.random().toString(36).slice(2),
      label: t.label,
      done: false,
      carriedOver: true
    }));
    nextState[cat.id] = [...carried, ...nextState[cat.id]];
    count += carried.length;
  });

  // Save next day
  try {
    localStorage.setItem(storageKey(nextDate), JSON.stringify(nextState));
  } catch(e) {}

  showToast(count + ' task' + (count !== 1 ? 's' : '') + ' carried to ' + nextDateLabel, 2500);
}

function render() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('todayBadge').style.display = isToday() ? 'inline' : 'none';
  document.getElementById('pastNotice').style.display = isToday() ? 'none' : 'block';

  const container = document.getElementById('categories');
  container.innerHTML = '';

  let totalDone = 0, totalAll = 0;

  CATEGORIES.forEach(cat => {
    const tasks = state[cat.id];
    totalAll += tasks.length;
    totalDone += tasks.filter(t => t.done).length;

    const section = document.createElement('div');
    section.className = 'category';
    section.setAttribute('data-cat', cat.id);

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-title"><span class="cat-dot"></span>${cat.label}</span>
      <button class="cat-add-btn" onclick="showAddInput('${cat.id}')">+ Add task</button>
    `;
    section.appendChild(header);

    const list = document.createElement('div');
    list.className = 'task-list';
    list.id = 'list_' + cat.id;

    if (tasks.length === 0) {
      list.innerHTML = '<span class="empty-hint">No tasks — add one above.</span>';
    } else {
      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item' + (task.done ? ' done' : '') + (task.carriedOver ? ' carried' : '');
        const hasComment = task.comment && task.comment.trim().length > 0;
        item.innerHTML = `
          <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''}
            onchange="toggleTask('${cat.id}', '${task.id}')">
          <span class="task-label" onclick="toggleTask('${cat.id}', '${task.id}')">${escapeHtml(task.label)}</span>
          ${task.carriedOver ? '<span class="carried-tag">carried</span>' : ''}
          <button class="task-comment-btn ${hasComment ? 'has-comment' : ''}"
            onclick="toggleComment('${cat.id}', '${task.id}')"
            title="${hasComment ? 'View/edit comment' : 'Add comment'}">&#128172;</button>
          <button class="task-del" onclick="deleteTask('${cat.id}', '${task.id}')" title="Remove">&#215;</button>
        `;

        // Comment box below the task row
        const commentBox = document.createElement('div');
        commentBox.className = 'task-comment-box';  // always hidden until toggled
        commentBox.id = 'comment_' + task.id;
        commentBox.innerHTML = `
          <textarea class="task-comment-textarea"
            id="commentta_${task.id}"
            placeholder="Add a note for this task…"
            onblur="saveComment('${cat.id}', '${task.id}')"
            onkeydown="if(event.key==='Escape')toggleComment('${cat.id}','${task.id}')"
          >${escapeHtml(task.comment || '')}</textarea>
          ${hasComment ? '<div class="task-comment-saved" id="commentsaved_'+task.id+'"></div>' : '<div class="task-comment-saved" id="commentsaved_'+task.id+'"></div>'}
        `;
        list.appendChild(item);
        list.appendChild(commentBox);
      });
    }
    section.appendChild(list);

    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    addRow.id = 'addrow_' + cat.id;
    addRow.innerHTML = `
      <input class="add-task-input" id="addinput_${cat.id}" type="text" placeholder="New task description…"
        onkeydown="handleAddKey(event, '${cat.id}')">
      <button class="add-confirm-btn" onclick="confirmAdd('${cat.id}')">Add</button>
      <button class="add-cancel-btn" onclick="hideAddInput('${cat.id}')">Cancel</button>
    `;
    section.appendChild(addRow);
    container.appendChild(section);
  });

  const pct = totalAll === 0 ? 0 : Math.round((totalDone / totalAll) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${totalDone} / ${totalAll} tasks complete`;
  document.getElementById('footerSummary').textContent =
    pct === 100 && totalAll > 0 ? 'All done!' : `${pct}% complete`;
}

function toggleTask(catId, taskId) {
  const task = state[catId].find(t => t.id === taskId);
  if (task) { task.done = !task.done; saveState(); render(); }
}

function deleteTask(catId, taskId) {
  state[catId] = state[catId].filter(t => t.id !== taskId);
  saveState(); render();
}

function showAddInput(catId) {
  document.getElementById('addrow_' + catId).classList.add('visible');
  setTimeout(() => document.getElementById('addinput_' + catId).focus(), 50);
}

function hideAddInput(catId) {
  document.getElementById('addrow_' + catId).classList.remove('visible');
  document.getElementById('addinput_' + catId).value = '';
}

function confirmAdd(catId) {
  const input = document.getElementById('addinput_' + catId);
  const label = input.value.trim();
  if (!label) return;
  state[catId].push({ id: catId + '_' + Date.now(), label, done: false });
  hideAddInput(catId);
  saveState(); render();
}

function handleAddKey(event, catId) {
  if (event.key === 'Enter') confirmAdd(catId);
  if (event.key === 'Escape') hideAddInput(catId);
}

function resetAll() {
  if (!confirm('Reset all checkboxes for this day? Your tasks will be kept.')) return;
  CATEGORIES.forEach(cat => state[cat.id].forEach(t => t.done = false));
  saveState(); render();
}

function clearAll() {
  if (!confirm('Clear all tasks for this day? This cannot be undone.')) return;
  localStorage.removeItem(storageKey(currentDate));
  CATEGORIES.forEach(cat => { state[cat.id] = []; });
  render();
}

function copyAsText() {
  const dateLabel = new Date(currentDate + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  let lines = ['Lab Checklist — ' + dateLabel, ''];
  let hasAnyTask = false;

  CATEGORIES.forEach(cat => {
    const tasks = state[cat.id];
    if (tasks.length === 0) return;
    hasAnyTask = true;
    lines.push('[' + cat.label.toUpperCase() + ']');
    tasks.forEach(task => {
      const carried = task.carriedOver ? ' (carried over)' : '';
      lines.push((task.done ? '\u2713 ' : '\u2610 ') + task.label + carried);
      if (task.comment && task.comment.trim()) {
        lines.push('   → ' + task.comment.trim());
      }
    });
    lines.push('');
  });

  if (!hasAnyTask) lines.push('(No tasks recorded for this day)');

  const text = lines.join('\n').trimEnd();

  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard!', 2200);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!', 2200);
  });
}

function showToast(message, duration) {
  const toast = document.getElementById('copyToast');
  toast.textContent = message;
  toast.style.display = 'block';
  toast.style.animation = 'none';
  toast.offsetHeight;
  toast.style.animation = 'fadeToast ' + (duration / 1000) + 's ease forwards';
  setTimeout(() => { toast.style.display = 'none'; }, duration + 100);
}

function toggleComment(catId, taskId) {
  const box = document.getElementById('comment_' + taskId);
  if (!box) return;
  const isVisible = box.classList.contains('visible');
  box.classList.toggle('visible');
  if (!isVisible) {
    setTimeout(() => {
      const ta = document.getElementById('commentta_' + taskId);
      if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
    }, 50);
  }
}

function saveComment(catId, taskId) {
  const ta = document.getElementById('commentta_' + taskId);
  if (!ta) return;
  const task = state[catId].find(t => t.id === taskId);
  if (!task) return;
  task.comment = ta.value;
  saveState();
  // Update comment button appearance
  const btn = ta.closest('.task-list').querySelector(`button.task-comment-btn[onclick*="${taskId}"]`);
  if (btn) {
    if (task.comment.trim()) btn.classList.add('has-comment');
    else btn.classList.remove('has-comment');
  }
  const saved = document.getElementById('commentsaved_' + taskId);
  if (saved) {
    saved.textContent = 'Saved';
    setTimeout(() => { if(saved) saved.textContent = ''; }, 1500);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadState(currentDate);
render();
</script>
</body>
</html>
